spring:
  application:
    name: exam-system-api

  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
 # gọn lỗi khi validate
server:
  error:
    include-stacktrace: never
    include-message: always